<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blood Donation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<style>
        body {
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #ff3b3b;
        }

        .navbar .nav-link,
        .navbar-brand {
            color: #fff !important;
            font-weight: 500;
        }

        .navbar .nav-link:hover {
            opacity: 0.8;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 90vh;
            background: url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 600;
        }

        .hero p {
            letter-spacing: 2px;
            font-weight: bold;
        }

        .btn-custom {
            background-color: #ff3b3b;
            color: #fff;
            padding: 12px 25px;
            border: none;
            font-weight: 600;
        }

        .btn-custom:hover {
            background-color: #e62e2e;
        }

        /* CTA Section */
        .cta {
            background: #f5f5f5;
            padding: 60px 20px;
            text-align: center;
        }

        .cta h3 {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .cta p {
            color: #777;
            margin-bottom: 25px;
        }
        .myContainer{
            display:flex;
            justify-content:space-around;
            background-color: #ff3b3b;
            align-items:center
        }
        .offcanvas a{
            text-decoration:none;
            color:white;
            font-size:19px;
            padding:10px;
            transition:2s ease;
            border-radius: 4px;
        }

        .offcanvas a:hover{
            background: black;
        }
    </style>
<body>

    <div class="myContainer">
        <button data-bs-toggle="offcanvas" data-bs-target="#sidebar"
        style="background:none;border:none;color:white;font-size:29px">
            ☰
        </button>
        <h3 style="color:white;font-size:29px">Bonded</h3>
    </div>

        <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar">
        <div class="offcanvas-header" style="background-color: #ff3b3b;color:white;">
            <h5>Menu</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas" style="color:white;"></button>
        </div>
        <div class="offcanvas-body" style="background-color: #3d3c3c;margin:none;padding:30px;">
            <a href="/admin" class="d-block mb-2">Admin</a>
            <a href="#" class="d-block mb-2">Donar Users</a>
            <a href="/recepRequest" class="d-block">Recep Request</a>
        </div>
</div>

<div class="table-responsive mt-3">
    <table class="table">
        <thead style="background: #000; color: #fff">
            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Phone Number</th>
                <th>Blood Group</th>
                <th>Gender</th>
                <th>Date Of Birth</th>
                <th>Location</th>
                <th>Health</th>
                <th>Donate</th>
            </tr>
        </thead>
        <tbody id="tbody">
            
        </tbody>
    </table>
</div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
<script>
    fetch("http://localhost:8000/userData")
    .then(res=>res.json()).then(data=>{
        let tbody = document.getElementById("tbody")
        tbody.innerHTML = ''
        data.forEach(e=>{
            let row = document.createElement("tr")
            let lastIndex = e.file.length - 1
            row.innerHTML = `
                <div id="image"><img src="http://localhost:8000/${e.file[lastIndex]}"
                    style="width:50px; border-radius:50%;cursor:pointer;"/></div>
                <td>${e.name}</td>
                <td>${e.number}</td>
                <td>${e.BloodGroup}</td>
                <td>${e.optionValue}</td>
                <td>${e.dob}</td>
                <td>${e.location}</td>
                <td>${e.health}</td>
                <td>${e.donate}</td>
            `
            tbody.appendChild(row)
        })

        
    }).catch(error=>{console.log(error)})
</script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blood Donation Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: url('https://media.istockphoto.com/id/1415405974/photo/blood-donor-at-donation-with-bouncy-ball-holding-in-hand.jpg?s=612x612&w=0&k=20&c=j0nkmkJxIP6U6TsI3yTq8iuc0Ufhq6xoW4FSMlKaG6A=') center/cover no-repeat; /* replace with your blood image */
        }
        .btn-primary {
            background-color: #dc3545;
            border-color: #dc3545;
        }
        .btn-primary:hover {
            background-color: #a71d2a;
        }
        .btn-outline-secondary {
            color: #dc3545;
        }
        .btn-outline-secondary:hover {
            background-color: #dc3545;
            color: white;
        }
        h3.card-title {
            color: #dc3545;
        }
        a {
            color: #dc3545;
        }
        a:hover {
            color: #a71d2a;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container-fluid mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h4 class="card-title text-center" style="background: #d34d5a;
                    padding:0; color:white; border-radius: 2px;">Reception</h4>
                    <form>
                        <div class="input-group input-group-sm mb-3">
                            <span for="name" class="input-group-text">Patient Name</span>
                            <input type="name" class="form-control" id="patientName" placeholder="Enter Patient Name" required>
                            <span for="fname" class="input-group-text" style="padding:10px;">Gurdian Name</span>
                            <input type="name" class="form-control" id="gurdianName" placeholder="Enter your Gurdian Name" required>
                        </div>
                        <div class="mb-3">

                        </div>
                        <div class="input-group input-group-sm mb-3">
                            <label for="email" class="input-group-text" style="padding:10px;">Email address</label>
                            <input type="email" class="form-control" id="gurdianEmail" placeholder="Enter Gurdian email" required>
                        </div>
                        <div class="input-group input-group-sm mb-3">
                            <label for="number" class="input-group-text" style="padding:10px;">Phone Number</label>
                            <input type="number" class="form-control" id="gurdianNumber" placeholder="Enter Gurdian number" required>
                        </div>

                        <div class="input-group input-group-sm mb-3">
                            <label for="location" class="input-group-text">Hospital</label>
                            <input type="text" class="form-control" id="hospital" placeholder="Enter Hospital Name" required>
                            <label for="date" class="input-group-text" style="padding:10px;">Date Of Birth</label>
                            <input type="date" class="form-control" id="dob" placeholder="Enter Patient Date Of Birth" required>
                        </div>

                        <div class="input-group input-group-sm mb-3">
                            <label for="text" class="input-group-text" style="padding:10px;">Hospital Location</label>
                            <input type="text" class="form-control" id="hospitalLocation" placeholder="Enter the Hospital location" required>
                        </div>

                        <div class="input-group input-group-sm mb-3">
                            <label  style="color: #d34d5a;padding:0px;" class="input-group-text">Gender</label><br>
                            <select class="form-select" id="gender">
                                <option>Select The Patient Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Transgender">Transgender</option>
                            </select>
                            <label style="color: #d34d5a" class="input-group-text">Blood Group</label><br>
                            <select class="form-select" id="bloodGroup">
                                <option>Select The Patient Blood Group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>

                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" id="submit">Submit Recep</button>
                        </div>
                    </form>

                    <hr>
                    <p class="text-center">Only Indigent People can Submit the Recep</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let submit = document.getElementById("submit")

submit.addEventListener("click",(e)=>{
    let patientName = document.getElementById("patientName").value
    let gurdianName = document.getElementById("gurdianName").value
    let gurdianEmail = document.getElementById("gurdianEmail").value
    let gurdianNumber = document.getElementById("gurdianNumber").value
    let dob = document.getElementById("dob").value
    let hospital = document.getElementById("hospital").value
    let bloodGroup = document.getElementById("bloodGroup").value
    let hospitalLocation = document.getElementById("hospitalLocation").value
    let gender = document.getElementById("gender").value
    let status = '❌'

    let patientDetail ={
        patientName,
        gurdianName,
        gurdianEmail,
        gurdianNumber,
        dob,
        hospital,
        bloodGroup,
        hospitalLocation,
        gender,
        status
    }
    if(confirm("Only Indigent People Can Submit This form Please don't submmit if you no need Blood")){
        fetch('http://localhost:8000/recepDetail',{
            method:'POST',
            headers:{
                'Content-Type':'application/json',
            },
            body: JSON.stringify(patientDetail)
        }).then(res=>res.json()).then(data=>{alert(data.msg)}).catch(error=>{
            console.log(error)
        })
    }
})
</script>
</body>
</html>

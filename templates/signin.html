<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation Signin</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Use a blood donation themed background image */
            background: url('https://media.istockphoto.com/id/1415405974/photo/blood-donor-at-donation-with-bouncy-ball-holding-in-hand.jpg?s=612x612&w=0&k=20&c=j0nkmkJxIP6U6TsI3yTq8iuc0Ufhq6xoW4FSMlKaG6A=') center/cover no-repeat; /* replace with your blood image */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signin-card {
            background-color: rgba(255, 255, 255, 0.95); /* semi-transparent for readability */
            padding: 2rem;
            border-radius: 1rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .signin-card h3 {
            color: #c0392b; /* blood-red heading */
            font-weight: bold;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .btn-blood {
            background-color: #c0392b;
            border: none;
        }

        .btn-blood:hover {
            background-color: #e74c3c;
        }

        .form-label {
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="signin-card">
    <h3>Blood Donation Sign In</h3>
    <form>
        <div class="mb-3">
            <label for="email" class="form-label">Email or Number</label>
            <input type="text" class="form-control" id="email" placeholder="Enter your email or number">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-blood w-100 mt-3" id="submit">Sign In</button>
    </form>
    <p class="text-center mt-3"><a href="#">Forgot Password?</a></p>
    <p class="text-center mt-3"><a href="/signup">Not Account?</a></p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script>
    document.getElementById("submit").addEventListener('click',()=>{
        const email = document.getElementById("email").value
        const password = document.getElementById("password").value

        const data = {
            email,
            password
        }

        fetch('http://localhost:8000/loginUser',{
            method: 'POST',
            headers:{
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        }).then(res=>res.json()).then(msg=>alert(msg.msg)).catch(error=>console.log(error))
    })
</script>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blood Donation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #ff3b3b;
        }

        .navbar .nav-link,
        .navbar-brand {
            color: #fff !important;
            font-weight: 500;
        }

        .navbar .nav-link:hover {
            opacity: 0.8;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 90vh;
            background: url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 600;
        }

        .hero p {
            letter-spacing: 2px;
            font-weight: bold;
        }

        .btn-custom {
            background-color: #ff3b3b;
            color: #fff;
            padding: 12px 25px;
            border: none;
            font-weight: 600;
        }

        .btn-custom:hover {
            background-color: #e62e2e;
        }

        /* CTA Section */
        .cta {
            background: #f5f5f5;
            padding: 60px 20px;
            text-align: center;
        }

        .cta h3 {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .cta p {
            color: #777;
            margin-bottom: 25px;
        }

        .offcanvas a{
            text-decoration:none;
            color:white;
            font-size:19px;
            padding:10px;
            transition:2s ease;
            border-radius: 4px;
        }

        #myChart {
    width: 300px !important;
    height: 300px !important;
    margin: auto;
}

        .offcanvas a:hover{
            background: black;
        }
        .myContainer{
            display:flex;
            justify-content:space-around;
            background-color: #ff3b3b;
            align-items:center
        }
    </style>
</head>

<body>

    <div class="myContainer">
        <button data-bs-toggle="offcanvas" data-bs-target="#sidebar"
        style="background:none;border:none;color:white;font-size:29px">
            ☰
        </button>
        <h3 style="color:white;font-size:29px">Bonded</h3>
    </div>

    
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar">
        <div class="offcanvas-header" style="background-color: #ff3b3b;color:white;">
            <h5>Menu</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas" style="color:white;"></button>
        </div>
        <div class="offcanvas-body" style="background-color: #3d3c3c;margin:none;padding:30px;">
            <a href="#" class="d-block mb-2">Admin</a>
            <a href="/donar" class="d-block mb-2">Donar Users</a>
            <a href="/recepRequest" class="d-block">Recep Request</a>
        </div>
</div>

<div class="container mt-3">
    <div class="row">

        <!-- First Column -->
        <div class="col-md-6">
            <div class="card p-3">
                <div class="card-body text-center">
                    <canvas id="myChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Second Column -->
        <div class="col-md-6">
            <div class="card p-3">
                <div class="card-body text-center">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

    </div>
</div>

                </div>

<div class="container mt-5">
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5 class="card-title">Total Users</h5>
                    <h2 id="totalUsers">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5 class="card-title">Donated Users</h5>
                    <h2 id="donatedUsers">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5 class="card-title">Not Donated</h5>
                    <h2 id="notDonated">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5 class="card-title">Total Requests</h5>
                    <h2 id="totalRequest">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5 class="card-title">Pending Requests</h5>
                    <h2 id="pendingRequest">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-12">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5 class="card-title">Completed Requests</h5>
                    <h2 id="doneRecep">0</h2>
                </div>
            </div>
        </div>

    </div>
</div>
    <script>
  fetch("http://localhost:8000/totalUsers")
.then(response => response.json())
.then(data => {

    document.getElementById("totalUsers").innerText =
        data.total_users;

    document.getElementById("donatedUsers").innerText =
        data.donated_user;

    document.getElementById("notDonated").innerText =
        data.total_not_donated;

    document.getElementById("totalRequest").innerText =
        data.total_request;

    document.getElementById("pendingRequest").innerText =
        data.pendding_request;

    document.getElementById("doneRecep").innerText =
        data.done_recep;
})
.catch(error => {
    console.log(error);
});
fetch("http://localhost:8000/totalUsers")
.then(res => res.json())
.then(data => {

    // Pie Chart
    new Chart(document.getElementById("myChart"), {
        type: 'pie',
        data: {
            labels: [
                'Total Users',
                'Donated Users',
                'Not Donated',
                'Total Requests',
                'Pending Requests',
                'Completed Requests'
            ],
            datasets: [{
                data: [
                    data.total_users,
                    data.donated_user,
                    data.total_not_donated,
                    data.total_request,
                    data.pendding_request,
                    data.done_recep
                ],
                backgroundColor: [
                    '#0d6efd',
                    '#198754',
                    '#dc3545',
                    '#ffc107',
                    '#fd7e14',
                    '#6f42c1'
                ]
            }]
        }
    });

    // Bar Chart
    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: [
                'Total Users',
                'Donated Users',
                'Not Donated',
                'Total Requests',
                'Pending Requests',
                'Completed Requests'
            ],
            datasets: [{
                label: 'Blood Bank Statistics',
                data: [
                    data.total_users,
                    data.donated_user,
                    data.total_not_donated,
                    data.total_request,
                    data.pendding_request,
                    data.done_recep
                ],
                backgroundColor: [
                    '#0d6efd',
                    '#198754',
                    '#dc3545',
                    '#ffc107',
                    '#fd7e14',
                    '#6f42c1'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

})
.catch(error => console.log(error));
fetch("http://localhost:8000/totalUsers")
.then(res => res.json())
.then(data => {

    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: [
                'Total Users',
                'Donated Users',
                'Not Donated',
                'Total Requests',
                'Pending Requests',
                'Completed Requests'
            ],
            datasets: [{
                label: 'Dashboard Statistics',
                data: [
                    data.total_users,
                    data.donated_user,
                    data.total_not_donated,
                    data.total_request,
                    data.pendding_request,
                    data.done_recep
                ],
                backgroundColor: [
                    '#0d6efd',
                    '#198754',
                    '#dc3545',
                    '#ffc107',
                    '#fd7e14',
                    '#6f42c1'
                ],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
        
    });

})
.catch(error => {
    console.log(error);
});
</script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
<script>
    
</script>
</html>
